<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서객체선택(class)</title>
</head>
<body>
    <h1 class="txt">큰제목</h1>
    <h1 class="txt">큰제목</h1>
    <h1 class="txt">큰제목</h1>

    <script>
        let tit=document.getElementsByClassName("txt");
        tit[0].style.border= "5px solid red";
        tit[1].style.border= "5px solid blue";
        tit[2].style.border= "5px solid green";
    </script>
</body>
</html>
