<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마우스 이벤트</title>
</head>
<body>
    <h1 id="txt">큰제목태그</h1>
    <h2 id="txt2">중간제목태그</h2>
    <p>첫번째 문단</p>

    <script>
        let tit1=document.getElementById("txt");
        tit1.addEventListener("click",function(){
            tit1.style.color="red";
            this.style.background = "yellow";
        })

        let tit2=document.getElementById("txt2")
        tit2.addEventListener("click",function(){
            tit2.style.border="5px solid red"
        })

        let tit3=document.querySelector("p")
        tit3.addEventListener("mouseenter",function(){
            this.style.fontSize="24px";
            this.style.color="red";
        })

        tit3.addEventListener("mouseleave",function(){
                this.style.fontSize="16px";
            this.style.color="#000";
        }
        )
        
        // let tit = document.querySelector("h1")
        // tit.onclick = function(){
        //     // tit.style.color="red";
        //     this.style.color="red";
        // };
    </script>
</body>
</html>
