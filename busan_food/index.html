<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>부산 맛집 서비스</title>

  <!-- ====================================================
       ★ API 키 설정 안내 ★
       1. 카카오맵 앱키: 아래 KAKAO_MAP_APP_KEY 값을 교체하세요
          - 카카오디벨로퍼스(https://developers.kakao.com) 에서 발급
       2. 공공데이터 서비스키: PUBLIC_API_SERVICE_KEY 값을 교체하세요
          - 공공데이터포털(https://www.data.go.kr) 에서 발급
  ==================================================== -->

  <!-- 카카오맵 SDK - 앱키를 교체하세요 -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_MAP_APP_KEY&libraries=services"></script>

  <style>
    /* ===== RESET ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #f2f2f2;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== SCREEN ===== */
    .screen { display: none; min-height: 100vh; background: #fff; }
    .screen.active { display: block; }

    /* =============================
       MAIN SCREEN
    ============================= */
    #main-screen { padding-bottom: 62px; }

    .main-header {
      padding: 18px 16px 10px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #e8e8e8;
    }
    .main-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .main-title {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.5px;
    }
    .header-icons {
      display: flex;
      gap: 14px;
      align-items: center;
      padding-top: 2px;
    }
    .header-icons button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
    }
    .header-icons svg { width: 22px; height: 22px; color: #333; }
    .total-count {
      font-size: 12px;
      color: #888;
      margin: 5px 0 10px;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 8px 12px;
      background: #fff;
    }
    .search-wrap svg { width: 17px; height: 17px; color: #aaa; flex-shrink: 0; }
    .search-wrap input {
      border: none;
      outline: none;
      flex: 1;
      margin-left: 8px;
      font-size: 13px;
      color: #333;
      background: transparent;
    }
    .search-wrap input::placeholder { color: #bbb; }

    /* List */
    .restaurant-list { background: #fff; }
    .list-item {
      padding: 15px 16px;
      border-bottom: 1px solid #efefef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .list-item:active { background: #fafafa; }
    .list-info { flex: 1; min-width: 0; }
    .list-name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-addr, .list-menu {
      font-size: 12px;
      color: #555;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-addr b, .list-menu b { font-weight: 700; color: #333; }
    .list-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .list-actions button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .list-actions svg { width: 20px; height: 20px; color: #888; }
    .list-actions .fav-btn.on svg { fill: #e74c3c; color: #e74c3c; }

    /* State messages */
    .state-msg {
      text-align: center;
      padding: 50px 20px;
      font-size: 13px;
      color: #999;
      line-height: 1.8;
    }
    .state-msg.error { color: #e74c3c; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #eee;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =============================
       BOTTOM NAV
    ============================= */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      border-top: 1px solid #ddd;
      background: #fff;
      z-index: 200;
    }
    .bottom-nav button {
      flex: 1;
      padding: 13px 0 12px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      cursor: pointer;
    }
    .bottom-nav button.active {
      color: #111;
      border-top: 2px solid #111;
      margin-top: -1px;
    }

    /* =============================
       DETAIL SCREEN
    ============================= */
    #detail-screen { padding-bottom: 20px; }

    .detail-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
    }
    .detail-topbar button {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }
    .detail-topbar svg { width: 20px; height: 20px; }

    .detail-img-wrap { width: 100%; height: 220px; overflow: hidden; background: #ccc; }
    .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-img-placeholder {
      width: 100%; height: 220px;
      display: flex; align-items: center; justify-content: center;
      background: #e0e0e0;
      color: #999; font-size: 13px;
    }

    .detail-body { padding: 0 16px 16px; }

    .detail-section { margin-top: 20px; }
    .detail-badge {
      display: inline-block;
      background: #222;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .detail-val {
      font-size: 14px;
      color: #333;
      line-height: 1.65;
      padding: 0 2px;
    }

    .detail-map-wrap {
      margin-top: 20px;
      height: 200px;
      border-radius: 8px;
      overflow: hidden;
      background: #e8e8e8;
    }
    #kakao-map { width: 100%; height: 100%; }

    /* =============================
       FAVORITES SCREEN
    ============================= */
    #favorites-screen { padding-bottom: 62px; }

    .fav-header {
      padding: 18px 16px 14px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
    }
    .fav-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fav-title {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.5px;
    }
    .fav-header button {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center;
    }
    .fav-header svg { width: 22px; height: 22px; color: #555; }

    /* ===== PAGINATION ===== */
    .pagination-wrap {
      padding: 18px 16px 14px;
      background: #fff;
      border-top: 1px solid #efefef;
    }
    .pagination-btns {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .page-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .page-btn:hover:not(:disabled):not(.active) { background: #f5f5f5; }
    .page-btn.active { background: #111; color: #fff; border-color: #111; font-weight: 700; }
    .page-btn:disabled { color: #ccc; border-color: #eee; cursor: default; }
    .page-btn.arrow { font-size: 18px; }
    .pagination-info { text-align: center; font-size: 12px; color: #999; }
  </style>
</head>
<body>

<!-- ==================== MAIN SCREEN ==================== -->
<div id="main-screen" class="screen active">
  <div class="main-header">
    <div class="main-header-top">
      <div class="main-title">부산 맛집 서비스</div>
      <div class="header-icons">
        <!-- 새로고침 -->
        <button onclick="loadRestaurants()" title="새로고침">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
        <!-- 즐겨찾기 바로가기 -->
        <button onclick="showScreen('favorites')" title="즐겨찾기">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="total-count" id="total-count">전체:0건</div>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" id="search-input" placeholder="가게명/주소/메뉴로 검색" oninput="filterList(this.value)">
    </div>
  </div>
  <div id="restaurant-list" class="restaurant-list">
    <div class="state-msg"><div class="spinner"></div><br>데이터를 불러오는 중...</div>
  </div>
  <!-- PAGINATION -->
  <div id="pagination-wrap" class="pagination-wrap" style="display:none;">
    <div class="pagination-btns" id="pagination-btns"></div>
    <div class="pagination-info" id="pagination-info"></div>
  </div>
</div>

<!-- ==================== DETAIL SCREEN ==================== -->
<div id="detail-screen" class="screen">
  <div class="detail-topbar">
    <button onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      뒤로
    </button>
  </div>
  <div id="detail-body"></div>
</div>

<!-- ==================== FAVORITES SCREEN ==================== -->
<div id="favorites-screen" class="screen">
  <div class="fav-header">
    <div class="fav-header-row">
      <div class="fav-title">즐겨찾기</div>
      <button onclick="showScreen('main')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="favorites-list" class="restaurant-list"></div>
</div>

<!-- ==================== BOTTOM NAV ==================== -->
<div class="bottom-nav" id="bottom-nav">
  <button class="active" id="nav-main" onclick="showScreen('main')">맛집</button>
  <button id="nav-fav" onclick="showScreen('favorites')">즐겨찾기</button>
</div>

<script>
// ============================================================
//  ★ API 키 설정 - 아래 두 값을 교체해주세요 ★
// ============================================================
var CFG = {
  SERVICE_KEY: 'd068d461869dd6a271d7a1a09011ca55762944e59ac201d01f519cf187fb460d',   // 공공데이터포털 서비스키 (인코딩)
  BASE_URL:    'https://apis.data.go.kr/6260000/FoodService',
  KAKAO_KEY:   '250f514839b135c174de55e8360c1593'          // 카카오맵 JavaScript 앱키
};
// ============================================================

var allData       = [];
var filteredData  = [];
var favorites     = JSON.parse(localStorage.getItem('bsn_favs') || '[]');
var prevScreen    = 'main';
var kakaoMapInst  = null;
var currentPage   = 1;
var PAGE_SIZE     = 10;

/* ── screen ── */
function showScreen(name) {
  ['main-screen','detail-screen','favorites-screen'].forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  var nav = document.getElementById('bottom-nav');

  if (name === 'main') {
    document.getElementById('main-screen').classList.add('active');
    document.getElementById('nav-main').classList.add('active');
    document.getElementById('nav-fav').classList.remove('active');
    nav.style.display = 'flex';
  } else if (name === 'favorites') {
    document.getElementById('favorites-screen').classList.add('active');
    document.getElementById('nav-main').classList.remove('active');
    document.getElementById('nav-fav').classList.add('active');
    nav.style.display = 'flex';
    renderFavorites();
  } else if (name === 'detail') {
    document.getElementById('detail-screen').classList.add('active');
    nav.style.display = 'none';
  }
}

function goBack() {
  showScreen(prevScreen === 'favorites' ? 'favorites' : 'main');
}

/* ── CORS 프록시를 통한 fetch ── */
function proxyFetch(url) {
  /* 1순위: allorigins 프록시 */
  var proxied = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  return fetch(proxied)
    .then(function(r){
      if (!r.ok) throw new Error('allorigins HTTP ' + r.status);
      return r.json();
    })
    .catch(function(){
      /* 2순위: corsproxy.io */
      var proxied2 = 'https://corsproxy.io/?' + encodeURIComponent(url);
      return fetch(proxied2).then(function(r){ return r.json(); });
    });
}

/* ── API: list ── */
function loadRestaurants() {
  var listEl = document.getElementById('restaurant-list');
  listEl.innerHTML = '<div class="state-msg"><div class="spinner"></div><br>데이터를 불러오는 중...</div>';
  allData = []; filteredData = [];
  document.getElementById('total-count').textContent = '전체:0건';

  var url = CFG.BASE_URL + '/getFoodList'
    + '?serviceKey=' + CFG.SERVICE_KEY
    + '&pageNo=1&numOfRows=300&resultType=json';

  proxyFetch(url)
    .then(function(json){
      /* 공공데이터 API 응답 구조 파싱 */
      var body = (json && json.getFoodList) ? json.getFoodList
               : (json && json.response && json.response.body) ? json.response.body
               : null;
      var items = [];
      var total = 0;
      if (body) {
        items = body.item || (body.items && body.items.item) || [];
        total = body.totalCount || body.total_count || 0;
      }
      if (!Array.isArray(items)) items = items ? [items] : [];

      allData = items;
      filteredData = items.slice();
      total = total || items.length;
      document.getElementById('total-count').textContent = '전체:' + total + '건';
      renderList(filteredData, 1);
    })
    .catch(function(e){
      console.error(e);
      listEl.innerHTML = '<div class="state-msg error">'
        + '데이터를 불러오지 못했습니다.<br>'
        + 'SERVICE_KEY를 확인하거나 잠시 후 다시 시도해주세요.<br><br>'
        + '<small style="color:#bbb">' + e.message + '</small>'
        + '</div>';
    });
}

/* ── helper: field values ── */
function v(obj, keys) {
  for (var i = 0; i < keys.length; i++) {
    if (obj[keys[i]] !== undefined && obj[keys[i]] !== null && obj[keys[i]] !== '') return obj[keys[i]];
  }
  return '';
}
function getName(r)  { return v(r,['MAIN_TITLE','mainTitle','TITLE','NM','name']); }
function getAddr(r)  { return v(r,['ADDR1','addr1','ADDRESS','ADDRRES','address']); }
function getMenu(r)  { return v(r,['RPRSNTV_MENU','rprsntvMenu','MENU','menu']); }
function getPrice(r) { return v(r,['RPRSNTV_MENU_PRICE','rprsntvMenuPrice','PRICE','price']); }
function getTel(r)   { return v(r,['CNTCT_TEL','cntctTel','TEL','tel','TELNO']); }
function getHours(r) { return v(r,['USAGE_DAY_WEEK_AND_TIME','usageDayWeekAndTime','OPEN_TIME','openTime','BIZRNO']); }
function getIntro(r) { return v(r,['ITEMCNTNTS','itemcntnts','CONTENT','content','MEMO']); }
function getImg(r)   { return v(r,['MAIN_IMG_NORMAL','mainImgNormal','IMAGE','image','RTNIMAGEURL']); }
function getId(r, i) { return v(r,['UC_SEQ','ucSeq','SEQ','seq']) || String(i); }

function menuLabel(r) {
  var m = getMenu(r), p = getPrice(r);
  if (!m) return '';
  return p ? m + ' ₩' + p : m;
}

/* ── render list (paginated) ── */
function renderList(data, page) {
  if (page !== undefined) currentPage = page;
  var el = document.getElementById('restaurant-list');
  var pw = document.getElementById('pagination-wrap');
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="state-msg">검색 결과가 없습니다.</div>';
    if (pw) pw.style.display = 'none';
    return;
  }
  var totalPages = Math.ceil(data.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  var start = (currentPage - 1) * PAGE_SIZE;
  var end   = start + PAGE_SIZE;
  var pageData = data.slice(start, end);
  el.innerHTML = pageData.map(function(r, pi){
    var i     = start + pi;
    var name  = getName(r)  || '이름 없음';
    var addr  = getAddr(r)  || '';
    var menu  = menuLabel(r);
    var id    = getId(r, i);
    var fav   = favorites.indexOf(id) !== -1;
    return '<div class="list-item" onclick="openDetail(\'' + escQ(id) + '\',' + i + ')">'
      + '<div class="list-info">'
      +   '<div class="list-name">' + esc(name) + '</div>'
      +   '<div class="list-addr"><b>주소:</b> ' + esc(addr) + '</div>'
      +   (menu ? '<div class="list-menu"><b>메뉴:</b> ' + esc(menu) + '</div>' : '')
      + '</div>'
      + '<div class="list-actions">'
      +   '<button onclick="event.stopPropagation();openDetail(\'' + escQ(id) + '\',' + i + ')" title="상세보기">'
      +     '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>'
      +   '</button>'
      +   '<button class="fav-btn ' + (fav?'on':'') + '" data-id="' + escQ(id) + '" onclick="event.stopPropagation();toggleFav(\'' + escQ(id) + '\',this)" title="즐겨찾기">'
      +     '<svg xmlns="http://www.w3.org/2000/svg" fill="' + (fav?'#e74c3c':'none') + '" viewBox="0 0 24 24" stroke="' + (fav?'#e74c3c':'currentColor') + '" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>'
      +   '</button>'
      + '</div>'
      + '</div>';
  }).join('');
  if (pw) { pw.style.display = 'block'; renderPagination(totalPages, data.length); }
}

/* ── pagination UI ── */
function renderPagination(totalPages, totalItems) {
  var btnsEl = document.getElementById('pagination-btns');
  var infoEl = document.getElementById('pagination-info');
  if (!btnsEl || !infoEl) return;
  var WINDOW = 5, half = Math.floor(WINDOW / 2);
  var s = Math.max(1, currentPage - half);
  var e = Math.min(totalPages, s + WINDOW - 1);
  if (e - s + 1 < WINDOW) s = Math.max(1, e - WINDOW + 1);
  var html = '';
  html += '<button class="page-btn arrow" onclick="goPage(' + (currentPage-1) + ')"' + (currentPage<=1?' disabled':'') + '>&#8249;</button>';
  for (var p = s; p <= e; p++) {
    html += '<button class="page-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  }
  html += '<button class="page-btn arrow" onclick="goPage(' + (currentPage+1) + ')"' + (currentPage>=totalPages?' disabled':'') + '>&#8250;</button>';
  btnsEl.innerHTML = html;
  infoEl.textContent = currentPage + ' / ' + totalPages + ' 페이지 · 총 ' + totalItems + '개';
}

/* ── go to page ── */
function goPage(p) {
  var totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  renderList(filteredData, p);
  var ms = document.getElementById('main-screen');
  if (ms) ms.scrollTop = 0;
  window.scrollTo(0, 0);
}


/* ── search ── */
function filterList(q) {
  q = q.trim().toLowerCase();
  if (!q) {
    filteredData = allData.slice();
  } else {
    filteredData = allData.filter(function(r){
      return (getName(r)+getAddr(r)+getMenu(r)).toLowerCase().indexOf(q) !== -1;
    });
  }
  document.getElementById('total-count').textContent = '전체:' + filteredData.length + '건';
  renderList(filteredData, 1);
}

/* ── detail ── */
function openDetail(id, idx) {
  prevScreen = document.getElementById('favorites-screen').classList.contains('active')
             ? 'favorites' : 'main';

  var r = filteredData[idx] || allData.find(function(x,i){ return getId(x,i) === id; }) || {};
  renderDetail(r, idx);
  showScreen('detail');
  document.getElementById('detail-screen').scrollTop = 0;

  /* API 상세 조회 */
  var ucSeq = v(r, ['UC_SEQ','ucSeq','SEQ','seq']);
  if (ucSeq) {
    var url = CFG.BASE_URL + '/getFoodDetail'
      + '?serviceKey=' + CFG.SERVICE_KEY
      + '&UC_SEQ=' + ucSeq
      + '&resultType=json';
    proxyFetch(url)
      .then(function(json){
        var body  = (json && json.getFoodDetail) ? json.getFoodDetail
                  : (json && json.response && json.response.body) ? json.response.body : null;
        var items = body ? (body.item || (body.items && body.items.item) || []) : [];
        if (!Array.isArray(items)) items = items ? [items] : [];
        if (items.length > 0) { renderDetail(items[0], idx); }
      })
      .catch(function(){ /* detail API 실패 시 목록 데이터 유지 */ });
  }
}

function renderDetail(r, idx) {
  var name   = getName(r)  || '이름 없음';
  var addr   = getAddr(r)  || '정보 없음';
  var intro  = getIntro(r);
  var menu   = getMenu(r);
  var price  = getPrice(r);
  var tel    = getTel(r);
  var hours  = getHours(r);
  var img    = getImg(r);
  var menuTxt = menu ? menu + (price ? ' ₩' + price + '원' : '') : '정보 없음';

  var html = '';

  /* 이미지 */
  if (img) {
    html += '<div class="detail-img-wrap"><img src="' + esc(img) + '" alt="' + esc(name)
          + '" onerror="this.parentElement.innerHTML=\'<div class=&quot;detail-img-placeholder&quot;>이미지 없음</div>\'"></div>';
  } else {
    html += '<div class="detail-img-placeholder">이미지 없음</div>';
  }

  html += '<div class="detail-body">';
  html += section('상호명', name);
  html += section('주소',   addr);
  if (intro) html += section('소개', intro);
  html += section('대표메뉴', menuTxt);
  if (tel)   html += section('연락처', tel);
  if (hours) html += section('운영시간', hours);

  /* 지도 */
  html += '<div class="detail-section"><div class="detail-map-wrap"><div id="kakao-map"></div></div></div>';
  html += '</div>'; /* detail-body */

  document.getElementById('detail-body').innerHTML = html;

  /* 지도 초기화 */
  setTimeout(function(){ initMap(addr, name); }, 200);
}

function section(label, val) {
  return '<div class="detail-section">'
    + '<div class="detail-badge">' + esc(label) + '</div>'
    + '<div class="detail-val">' + esc(val) + '</div>'
    + '</div>';
}

/* ── kakao map ── */
function initMap(addr, name) {
  var mapEl = document.getElementById('kakao-map');
  if (!mapEl || typeof kakao === 'undefined') return;
  try {
    var opts = { center: new kakao.maps.LatLng(35.1796, 129.0756), level: 4 };
    kakaoMapInst = new kakao.maps.Map(mapEl, opts);
    var geocoder  = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(addr, function(result, status){
      if (status === kakao.maps.services.Status.OK) {
        var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
        new kakao.maps.Marker({ map: kakaoMapInst, position: coords });
        kakaoMapInst.setCenter(coords);
      }
    });
  } catch(e) { console.warn('Kakao map init error:', e); }
}

/* ── favorites ── */
function toggleFav(id, btn) {
  var idx = favorites.indexOf(id);
  var svg = btn.querySelector('svg');
  if (idx === -1) {
    favorites.push(id);
    btn.classList.add('on');
    svg.setAttribute('fill',   '#e74c3c');
    svg.setAttribute('stroke', '#e74c3c');
  } else {
    favorites.splice(idx, 1);
    btn.classList.remove('on');
    svg.setAttribute('fill',   'none');
    svg.setAttribute('stroke', 'currentColor');
  }
  localStorage.setItem('bsn_favs', JSON.stringify(favorites));
}

function renderFavorites() {
  var el = document.getElementById('favorites-list');
  var items = allData.filter(function(r, i){ return favorites.indexOf(getId(r,i)) !== -1; });
  if (items.length === 0) {
    el.innerHTML = '<div class="state-msg">즐겨찾기한 맛집이 없습니다.</div>';
    return;
  }
  el.innerHTML = items.map(function(r, i){
    var name = getName(r) || '이름 없음';
    var addr = getAddr(r) || '';
    var menu = menuLabel(r);
    var id   = getId(r, allData.indexOf(r));
    var ri   = allData.indexOf(r);
    return '<div class="list-item" onclick="openDetailFav(\'' + escQ(id) + '\',' + ri + ')">'
      + '<div class="list-info">'
      +   '<div class="list-name">' + esc(name) + '</div>'
      +   '<div class="list-addr"><b>주소:</b> ' + esc(addr) + '</div>'
      +   (menu ? '<div class="list-menu"><b>메뉴:</b> ' + esc(menu) + '</div>' : '')
      + '</div>'
      + '<div class="list-actions">'
      +   '<button onclick="event.stopPropagation();openDetailFav(\'' + escQ(id) + '\',' + ri + ')" title="상세보기">'
      +     '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>'
      +   '</button>'
      +   '<button class="fav-btn on" onclick="event.stopPropagation();removeFav(\'' + escQ(id) + '\')" title="즐겨찾기 해제">'
      +     '<svg xmlns="http://www.w3.org/2000/svg" fill="#e74c3c" viewBox="0 0 24 24" stroke="#e74c3c" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>'
      +   '</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function openDetailFav(id, ri) {
  prevScreen = 'favorites';
  var r = allData[ri] || {};
  renderDetail(r, ri);
  showScreen('detail');
  document.getElementById('detail-screen').scrollTop = 0;
}

function removeFav(id) {
  var idx = favorites.indexOf(id);
  if (idx !== -1) { favorites.splice(idx, 1); localStorage.setItem('bsn_favs', JSON.stringify(favorites)); }
  renderFavorites();
}

/* ── utils ── */
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escQ(str) { return String(str || '').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ── init ── */
window.addEventListener('DOMContentLoaded', loadRestaurants);
</script>
