<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form데이터베이스연결</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="formbox">
      <form name="submit-to-google-sheet">
        <!-- 구글 sheet title 제목 -->
        <input type="text" name="Name" placeholder="Your Name" />
        <input type="email" name="Email" placeholder="Your Email" />
        <textarea name="Message" rows="6" placeholder="Your Message"></textarea>
        <input type="submit" class="btn btn2" value="Submit" />
      </form>

      <!-- 전송 상황을 메세지를 뿌려주는 요소 -->
      <span id="msg"></span>
    </div>
    <script>
      const scriptURL =
        https://script.google.com/macros/s/AKfycbz4X29NQMKhvYQ2nZW5idD4WCutv3xykRbwpg1322NuH4ddImXffafNEK6t-pF60_Gm/exec; // add your own app script link here
      const form = document.forms["submit-to-google-sheet"];
      const msg = document.getElementById("msg");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        fetch(scriptURL, { method: "POST", body: new FormData(form) })
          .then((response) => {
            msg.innerHTML = "Message sent successfully";
            setTimeout(function () {
              msg.innerHTML = "";
            }, 5000);
            form.reset();
          })
          .catch((error) => console.error("Error!", error.message));
      });
    </script>
  </body>
</html>
