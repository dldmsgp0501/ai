<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CAMBAK Splash</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: #ffffff;
      overflow: hidden;
    }

    .logo-wrap {
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 1.2s ease-out;
    }

    .pin-logo {
      width: 56px;
      height: 70px;
    }

    .brand {
      color: #1f69be;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    @media (min-width: 768px) {
      .app {
        width: 375px;
        height: 812px;
        border: 1px solid rgba(0,0,0,0.05);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="logo-wrap">

      <!-- 로고 SVG -->
      <svg class="pin-logo" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 4 C20 4 6 19 6 38 C6 61 31 82 40 96 C49 82 74 61 74 38 C74 19 60 4 40 4Z"
              fill="#1f69be"/>

        <circle cx="40" cy="36" r="27" fill="#ffffff"/>

        <path d="M22 23 Q40 10 58 23"
              fill="none"
              stroke="#1f69be"
              stroke-width="3"
              stroke-linecap="round"/>

        <circle cx="32" cy="18" r="1.7" fill="#1f69be"/>
        <circle cx="40" cy="15" r="1.7" fill="#1f69be"/>
        <circle cx="48" cy="18" r="1.7" fill="#1f69be"/>

        <rect x="20" y="34" width="28" height="13" rx="2.5" fill="#1f69be"/>
        <rect x="48" y="37" width="11" height="10" rx="2" fill="#1f69be"/>

        <rect x="23" y="37" width="7" height="5" rx="1" fill="#ffffff"/>
        <rect x="32" y="37" width="7" height="5" rx="1" fill="#ffffff"/>

        <rect x="43" y="36" width="4" height="11" rx="1" fill="#ffffff"/>

        <circle cx="28" cy="50" r="4" fill="#1f69be"/>
        <circle cx="53" cy="50" r="4" fill="#1f69be"/>
        <circle cx="28" cy="50" r="1.5" fill="#ffffff"/>
        <circle cx="53" cy="50" r="1.5" fill="#ffffff"/>

        <path d="M24 61 C34 58 43 58 56 61 L40 82 Z"
              fill="#1f69be"/>

        <path d="M40 62 L40 78"
              stroke="#ffffff"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-dasharray="4 4"/>
      </svg>

      <div class="brand">CAMBAK</div>
    </div>
  </div>

  <script>
    // 3초 후 네이버로 이동
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.location.href = "./work1.html";
      }, 3000);
    });
  </script>
</body>
</html>
