<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1680" />
  <title>Claude Header Desktop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-width: 1220px;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
    }

    body {
      display: block;
    }

    .header {
      width: 100%;
      height: 70px;
      background: #ffffff;
      border-bottom: 1px solid #d8d8d8;
    }

    .header-inner {
      width: 1220px;
      height: 70px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-mark {
      color: #d97a55;
      font-size: 26px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .logo-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.8px;
      line-height: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 54px;
      justify-self: center;
    }

    .nav a {
      display: inline-block;
      text-decoration: none;
      color: #303030;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1;
      white-space: nowrap;
      position: relative;
      transition: color 0.2s ease;
      z-index: 1;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -30px;
      width: 100%;
      height: 6px;
      background: #D97757;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s ease;
      z-index: 2;
    }
    .nav a:hover {
      color: #D97757;
    }

    .nav a:hover::after {
      transform: scaleX(1);
    }
    .nav a:hover {
      color: #D97757;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }

    .btn-dark {
      background: #333333;
      color: #ffffff;
    }

    .btn-orange {
      background: #dc845c;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo-area">
        <span class="logo-mark">✳</span>
        <h1 class="logo-text">Claude</h1>
      </div>

      <nav class="nav">
        <a href="#">ABOUT</a>
        <a href="#">PRODUCTS</a>
        <a href="#">PARTERSHIP</a>
        <a href="#">EDUCATION</a>
        <a href="#">WHAT’S NEW</a>
        <a href="#">SUPPORT</a>
      </nav>

      <div class="actions">
        <a href="#" class="btn btn-dark">매장찾기</a>
        <a href="#" class="btn btn-orange">글로벌마켓</a>
      </div>
    </div>
  </header>
</body>
</html>
