<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>절대반지는?</title>
</head>
<body style="margin:0; background:#efefef; font-family:'Malgun Gothic', sans-serif;">
  <div style="width:100%; min-height:100vh; display:flex; justify-content:center; align-items:flex-start;">
    <div style="width:887px; height:325px; text-align:center; box-sizing:border-box; padding-top:6px; background:#efefef;">
      <h1 style="margin:0 0 18px 0; font-size:23px; color:#d92b2b; font-weight:700;">절대반지는?</h1>

      <!-- 1 -->
      <p style="margin:0 0 10px 0; font-size:15px; color:#d07a3d; line-height:1.4;">반지 세 개는 하늘 아래 요정왕들을 위한 것,</p>
      <hr style="width:372px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 2 -->
      <p style="margin:0; font-size:15px; color:#3d45b8; line-height:1.4;">일곱 개는 돌의 전당에 있는 난쟁이 군주들을 위한 것,</p>
      <hr style="width:430px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 3 -->
      <p style="margin:0 0 10px 0; font-size:15px; color:#d8c64b; line-height:1.4;">아홉 개는 죽은 운명의 인간을 위한 것,</p>
      <hr style="width:350px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 4 -->
      <p style="margin:0; font-size:15px; color:#d07a3d; line-height:1.4;">하나는 암흑의 황좌에 앉은 암흑 제왕을 위한 것</p>
      <hr style="width:405px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 5 -->
      <p style="margin:0 0 10px 0; font-size:15px; color:#3d45b8; line-height:1.4;">그곳은 망령들이 지배하는 모르도르의 땅</p>
      <hr style="width:300px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 6 -->
      <p style="margin:0; font-size:15px; color:#d8c64b; line-height:1.4;">그 모든 반지를 다스릴 반지하나, 그 모든 반지를 찾기 위한 절대반지,</p>
      <hr style="width:520px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 7 -->
      <p style="margin:0; font-size:15px; color:#d07a3d; line-height:1.4;">그 모든 반지를 암흑 속에 가두기 위한 반지는 절대반지뿐,</p>
      <hr style="width:510px; border:none; border-top:1px solid #b7b7b7; margin:3px auto 6px auto;">

      <!-- 8 -->
      <p style="margin:0 0 12px 0; font-size:15px; color:#3d45b8; line-height:1.4;">바로 망령들이 누워 있는 모르도르의 땅에</p>
      <hr style="width:100vw; position:relative; left:50%; transform:translateX(-50%); border:none; border-top:1px solid #b7b7b7; margin:3px 0 6px 0;">

      <!-- 9 -->
      <p style="margin:0; font-size:14px; color:#4e8d3a; font-style:italic; line-height:1.4;">반지의 제왕 중에서...</p>
      
    </div>
  </div>
</body>
</html>
