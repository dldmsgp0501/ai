<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리바이스 상품</title>
    <style>
        p{
            text-align: center;
        }
    </style>
</head>
<body>
    <p id="main">
        <img src="./img/levis.jpg" alt="메인화면" usemap="#le">
        <map name="le">
            <area shape="rect" coords="11,48,275,697" href="#1st" alt="1번스타일">
            <area shape="rect" coords="284,47,570,693" href="#2st" alt="2번스타일">
            <area shape="rect" coords="575,52,854,651" href="#3st" alt="3번스타일">
        </map>
    </p>
    <p id="1st">
        <img src="./img/levis1.jpg" alt="1st" usemap="#1b">
        <map name="1b">
            <area shape="circle" coords="803,5305,42" href="#main" alt="메인으로">
        </map>
    </p>
    <p id="2st">
        <img src="./img/levis2.jpg" alt="2st" usemap="#2b">
        <map name="2b">
            <area shape="circle" coords="807,6564,42" href="#main" alt="메인으로">
        </map>
    </p>
    <p id="3st">
        <img src="./img/levis3.jpg" alt="3st" usemap="#3b">
        <map name="3b">
            <area shape="circle" coords="802,5946,42" href="#main" alt="메인으로">
        </map>
    </p>
</body>
</html>
