<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if제1형식</title>
</head>
<body>
    <script>
        // 1.if문 (조건문) 제1형식
        // if(조건식){
        // 참일때 실행
        // }
        // 거짓일때 실행
        // 외부로부터 data를 입력 받아서 그점수가 80점 이상이면 "합격"
        let score = prompt("나이를 입력하세요")
        if(score>19){
            alert("성인");
        }
        if(score<=19){
            alert("미성년자");
        }
        
    </script>
</body>
</html>
