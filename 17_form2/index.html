<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/sty.css">
</head>
<body>
    <h1>입력요소의 종류와 속성</h1>
    <form action="" name="">
        <fieldset>
            <legend>로그인</legend>
            <ul>
                <li>
                    <label for="">아이디</label>
                    <input type="text" placeholder="아이디를 입력해주세요." required  autofocus>
                    <input type="button" value="중복확인">
                </li>
                <li>
                    <label for="">패스워드</label>
                    <input type="password" placeholder="패스워드를 입력하세요." required>
                </li>
            </ul>
            
        </fieldset><button type="submit">로그인</button>
            <button type="reset">취소</button>
    </form>

    <form action="">
        <fieldset>
            <legend>나의 정보</legend>
            <ul>
                <li>
                    <label for="">Email</label>
                    <input type="email" placeholder="exam@naver.com" required>
                </li>
                <li>
                    <label for="">국적</label>
                    <label for="">내국인</label>
                    <input type="radio" name="person" checked>
                    <label for="">외국인</label>
                    <input type="radio" name="person">
                </li>
                <li>
                    <label for="">Search</label>
                    <input type="text" placeholder="web design" disabled>
                </li>
                <li>
                    <label for="">Url</label>
                    <input type="Ual" placeholder="https://">
                </li>
            </ul>
            
        </fieldset><button type="submit">전송</button>
            <button type="reset">취소</button>
    </form>
    <form action="">
        <fieldset>
            <legend>나의 일정</legend>
            <ul>
                <li>
                    <label for="">숫자입력</label>
                    <input type="number" value="1" min="1" max="10">
                </li>
                <li>
                    <label for="">전화번호</label>
                    <input type="text" value="010" disabled>
                    <input type="text" class="tel" maxlength="4">
                    <input type="text" class="tel" maxlength="4">
                </li>
                <li>
                    <label for="">난이도(상,중,하)</label>
                    <input type="range" max="3" value="2">
                </li>
            </ul>
            
        </fieldset><button type="submit">전송</button>
            <button type="reset">취소</button>
    </form>

    <form action="">
    <fieldset>
        <legend>예약관리</legend>
        <ul>
            <li>
                <label for="">예약날짜</label>
            <input type="date">
            </li>
            <li>
                <label for="">예약시간</label>
                <input type="time">
            </li>
            <li>
                <label for="">예약날짜및시간</label>
                <input type="datetime-local">
            </li>
        </ul>
        
    </fieldset><button type="submit">전송</button>
            <button type="reset">취소</button>
</form>
<form action="">
    <fieldset>
        <legend>그래프(진행사항)</legend>
        <ul>
            <li>
                <label for="">color선택</label>
                <input type="color">
            </li>
            <li>
                <label for="">진행률 70%</label>
                <meter value="70" max="100"></meter>
            </li>
            <li>
                <label for="">사용량</label>
                <meter value="70" max="100"></meter>
            </li>
        </ul>
    </fieldset>
    <div class="btn">
        <button type="submit">전송</button>
        <button type="reset">취소</button>
    </div>
</form>
</body>
</html>
