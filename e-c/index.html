<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BLACKUP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #000; color: #fff; }

    header {
      background: #fff;
      color: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      font-size: 14px;
    }

    .logo {
      font-weight: bold;
      font-size: 24px;
      letter-spacing: 2px;
    }

    nav {
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 12px 0;
      font-size: 13px;
    }

    nav a { color: #fff; text-decoration: none; }

    .hero {
      width: 100%;
      height: 700px;
      background: url('https://images.unsplash.com/photo-1520975922215-3a3b5a9e3bcb') center/cover no-repeat;
    }

    .section {
      padding: 80px 120px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 60px;
    }

    .card img {
      width: 100%;
      display: block;
    }

    footer {
      background: #111;
      color: #aaa;
      padding: 60px 120px;
      font-size: 12px;
      line-height: 1.6;
    }

    .footer-menu {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
      color: #fff;
    }

    .footer-menu div {
      cursor: pointer;
    }

  </style>
</head>
<body>

  <header>
    <div>SHOP</div>
    <div class="logo">BLACKUP</div>
    <div>SEARCH &nbsp;&nbsp; ACCOUNT &nbsp;&nbsp; BAG: 0</div>

  <div class="hero"></div>

  <section class="section">
    <div class="grid-3">
      <div class="card"><img src="https://images.unsplash.com/photo-1519741497674-611481863552"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1585386959984-a41552231658"></div>
    </div>

    <div class="grid-4">
      <div class="card"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1520975916090-3105956dac38"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1520974735194-5a6f0c4b3f0a"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"></div>

      <div class="card"><img src="https://images.unsplash.com/photo-1520975928316-3e5b6f3a0a2d"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1520975916090-3105956dac38"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1520975922215-3a3b5a9e3bcb"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1520975928316-3e5b6f3a0a2d"></div>
    </div>
  </section>

  <footer>

</body>
</html>
