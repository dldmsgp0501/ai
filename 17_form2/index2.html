<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응용</title>
    <link rel="stylesheet" href="./css/sty2.css">
</head>
<body>
    <h1>상품 주문서</h1>
    <form action="">
        <fieldset>
            <legend>개인정보</legend>
            <ul>
                <li>
                    <label for="">이름</label>
                    <input type="text" placeholder="여백없이 입력" required>
                    
                </li>
                <li>
                    <label for="">비밀번호</label>
                    <input type="password" placeholder="비밀번호를 입력하시오" required>
                </li>
            </ul>
        </fieldset>
    </form>
    <form action="">
        <fieldset>
            <legend>배송지 정보</legend>
            <ul>
                <li>
                    <label for="">주소</label>
                    <input type="text" placeholder="여백없이 입력" required>
                    
                </li>
                <li>
                    <label for="">전화번호</label>
                    <input type="text" class="tel" value="010" disabled>
                    <input type="text"  maxlength="4">
                    <input type="text"  maxlength="4">
                </li>
                <li>
                    <label for="">메모</label>
                    <input type="text" class="memo" placeholder="여기에 메모를 입력하세요">
                </li>
            </ul>
        </fieldset>
    </form>
    <form action="">
        <fieldset>
            <legend>주문정보</legend>
            <ul>
                <li>
                    <label for="">과태말라 안티구아(100g)</label>
                    <input class="nu" type="number" value="0">
                    <label for="">개</label>
                </li>
                <li>
                    <label for="">인도네시아 만델링(100g)</label>
                    <input class="nu" type="number" value="0">
                    <label for="">개</label>
                </li>
                <li>
                    <label for="">탐라는도다 (블렌딩) (100g)</label>
                    <input class="nu" type="number" value="0">
                    <label for="">개</label>
                </li>
                <li>
                    <label  class="radio" for="">01</label>
                    <input  class="radio" type="checkbox" name="ch">
                    <label  class="radio"  for="">02</label>
                    <input  class="radio" type="checkbox" name="ch">
                    <label  class="radio" for="">03</label>
                    <input  class="radio" type="checkbox" name="ch">
                    <label  class="radio" for="">04</label>
                    <input  class="radio" type="checkbox" name="ch">
                </li>
                <li>
                    <label class="radio" for="">r01</label>
                    <input  class="radio" type="radio" name="ra">
                    <label  class="radio" for="">r02</label>
                    <input  class="radio" type="radio" name="ra">
                    <label  class="radio" for="">r03</label>
                    <input  class="radio" type="radio" name="ra">
                    <label  class="radio" for="">r04</label>
                    <input  class="radio" type="radio" name="ra">
                </li>
            </ul>
        </fieldset>
    </form>
    <form action="">
        <fieldset>
            <legend>버튼모음</legend>
            <ul>
                <li class="bla">주문하기</li>
            </ul>
        </fieldset>
    </form>
</body>
</html>
