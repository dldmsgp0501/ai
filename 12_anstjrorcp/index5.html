<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서객체선택 응용</title>
</head>
<body>
    <h1>회원명단</h1>
    <ul>
        <li>강영훈</li>
        <li>류다은</li>
        <li>김효중</li>
        <li>손서옥</li>
        <li>홍길동</li>
    </ul>

    <script>
                let tit2 =document.getElementsByTagName("li")
        tit2[0].style.background="yellow"
        tit2[1].style.background="orange"
        tit2[2].style.background="yellow"
        tit2[3].style.background="orange"
        tit2[4].style.background="yellow"

        tit2[0].style.fontSize="24px"
        tit2[2].style.fontSize="24px"
        tit2[4].style.fontSize="24px"

        tit2[1].style.color="#fff"
        tit2[3].style.color="#fff"
        tit2[0].style.listStyle="none"
        tit2[2].style.listStyle="none"
        tit2[4].style.listStyle="none"
    </script>
</body>
</html>
