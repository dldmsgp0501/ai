<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">MAUVE</h1>
            <div class="header-icons">
                <button class="icon-btn" aria-label="검색">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button class="icon-btn" aria-label="장바구니" onclick="location.href='cart.html'">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="8" cy="21" r="1"></circle>
                        <circle cx="19" cy="21" r="1"></circle>
                        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
                    </svg>
                    <span class="badge">3</span>
                </button>
                <button class="icon-btn" aria-label="알림">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
        <div class="page-title-wrapper">
            <h2 class="page-title">카테고리</h2>
            <p class="page-subtitle">원하는 스타일을 찾아보세요</p>
        </div>

        <!-- 카테고리 그리드 -->
        <div class="category-grid">
            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #FFE5ED 0%, #FFC5D4 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h3 class="category-name">전체</h3>
                <p class="category-count">240개</p>
            </div>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #F5E6FF 0%, #E1C4FF 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>

                        <line x1="22" x2="16" y1="11" y2="11"></line>
                    </svg>

            </div>

            <div class="category-card">

                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                        <line x1="7" x2="7.01" y1="7" y2="7"></line>
                    </svg>
                </div>
                <h3 class="category-name">상의</h3>
                <p class="category-count">68개</p>
            </div>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #D6F5FF 0%, #A3E4FF 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                        <circle cx="9" cy="9" r="2"></circle>
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                    </svg>

                <h3 class="category-name">하의</h3>
                <p class="category-count">45개</p>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #FFF4D6 0%, #FFE5A3 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 6 9 17l-5-5"></path>
                    </svg>
                </div>
                <h3 class="category-name">원피스</h3>
                <p class="category-count">38개</p>
            </div>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20.5 16a2.5 2.5 0 0 1-2.5 2.5H6a2.5 2.5 0 0 1 0-5h12a2.5 2.5 0 0 1 2.5 2.5z"></path>
                        <path d="M2.5 8A2.5 2.5 0 0 1 5 5.5h14A2.5 2.5 0 0 1 21.5 8"></path>
                    </svg>
                </div>
                <h3 class="category-name">신발</h3>
                <p class="category-count">32개</p>
            </div>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #F3E5F5 0%, #E1BEE7 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                </div>

            </div>

            <div class="category-card">
                <div class="category-image" style="background: linear-gradient(135deg, #FCE4EC 0%, #F8BBD0 100%);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <h3 class="category-name">악세서리</h3>
                <p class="category-count">25개</p>
            </div>

        <button class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
