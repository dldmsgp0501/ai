<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동영상 삽입</title>
    <link rel="stylesheet" href="./css/sty.css">
</head>
<body>
    <h1>홍보/마케팅 동영상</h1>
    <hr>
    <div class="imgbox">
        <img src="./img/sampleimg.png" alt="">
    </div>
    <div class="movie_wrap">
        <div class="movie">
            <video autoplay muted loop controls>
                <source src="./movi/sample1.mp4" type="video/mp4">
            </video>
        </div>
        <div class="movie">
            <video autoplay muted loop controls>
                <source src="./movi/sample2.mp4" type="video/mp4">
            </video>
        </div>
        <div class="movie">
            <video autoplay muted loop controls>
                <source src="./movi/sample3.mp4" type="video/mp4">
            </video>
        </div>
        <div class="movie">
            <video autoplay muted loop controls>
                <source src="./movi/sample4.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!--  유튜브 영상 삽입 -->
    <div class="youtube">
        <iframe width="560" height="315" 
        src="https://www.youtube.com/embed/_GxfT8hyaDM?si=lNSK0F4iYVlaPm9d" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen></iframe>
    </div>
</body>
</html>
