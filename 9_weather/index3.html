<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자전거 길</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    /* padding: 24px 16px; */
    font-family: 'Noto Sans KR', sans-serif;
  }
  .phone-wrap {
    width: 375px;
    background: #fff;
    /* border-radius: 48px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.22), 0 0 0 10px #1a1a1a, 0 0 0 12px #333; */
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    padding: 14px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { fill: #fff; }
  .scroll-area {
    height: 780px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Hero 375x375 */
  .hero {
    position: relative;
    width: 375px;
    height: 375px;
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(140deg, #3eb8d6 0%, #52c9a4 45%, #2aa0c5 100%);
  }
  .hero > img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    overflow: hidden;
  }

  .hero-slider {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  .hero-track {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease;
  }

  .hero-track img {
    width: 375px;
    height: 375px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .hero-text {
    position: absolute;
    left: 24px;
    top: 50px;
    z-index: 2;
  }
  .hero-name {
    font-size: 18px;
    font-weight: 700;
    color: #FF9500;
    line-height: 1.5;
    text-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }
  .hero-sub {
    font-size: 15px;
    font-weight: 500;
    color: #FF9500;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .hero-deco1 {
    position: absolute; top: 28px; right: 28px;
    width: 90px; height: 90px;
    background: rgba(255,255,255,0.1); border-radius: 50%;
  }
  .hero-deco2 {
    position: absolute; top: 68px; right: 68px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.07); border-radius: 50%;
  }

  /* Info Panel */
  .info-panel {
    background: transparent;
    padding: 16px 16px;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }
  .info-box {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.08);
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-height: 56px;
  }
  .info-box-icon { font-size: 20px; line-height: 1; }
  .info-box-label { font-size: 11px; color: #999; font-weight: 500; white-space: nowrap; text-align: center; }
  .info-box-value { font-size: 21px; font-weight: 800; color: #111; line-height: 1.1; }
  .info-box-value span { font-size: 12px; font-weight: 400; color: #888; }
  .info-box-sub { font-size: 11px; color: #777; text-align: center; line-height: 1.3; }

  /* Section Title */
  .section-title {
    font-size: 15px; font-weight: 700; color: #111;
    padding: 16px 20px 10px;
  }

  /* Horizontal Drag Scroll — 150x180 */
  .h-scroll-outer { padding: 0 20px 16px; }
  .h-scroll-wrap {
    display: flex;
    gap: 10px;
    cursor: grab;
    user-select: none;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .h-scroll-wrap::-webkit-scrollbar { display: none; }
  .h-scroll-wrap.dragging { cursor: grabbing; }
  .h-card {
    flex-shrink: 0;
    width: 150px;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .h-card-inner {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 12px;
  }
  .h-card-label {
    font-size: 12px; font-weight: 600; color: #fff;
    background: rgba(0,0,0,0.38); padding: 4px 9px;
    border-radius: 10px; backdrop-filter: blur(3px);
    display: inline-block; line-height: 1.4;
  }

  /* Vertical Cards — 327x370 */
  .v-cards {
    padding: 8px 24px 100px;
    display: flex; flex-direction: column;
    gap: 14px; align-items: center;
  }
  .v-card {
    width: 327px; height: 370px;
    border-radius: 20px; overflow: hidden;
    position: relative; flex-shrink: 0; cursor: pointer;
  }
  .v-card-placeholder { width: 100%; height: 100%; display: block; }
  .v-card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 24px 20px 22px;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
  }
  .v-card-tag { font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 5px; }
  .v-card-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.4; }

  /* Bottom Nav */
  .bottom-nav {
    position: sticky; bottom: 0;
    background: #fff; border-top: 1px solid #f0f0f0;
    display: flex; justify-content: space-around;
    padding: 10px 0 28px; /* 하단 여백 늘림 */
    z-index: 99;
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer;
    padding: 4px 10px; border-radius: 10px;
    transition: background 0.12s;
  }
  .nav-item:active { background: #f5f5f5; }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-label { font-size: 10px; color: #aaa; font-weight: 500; }

  /* 홈 인디케이터 */
  .home-indicator {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 5px;
    background: #000;
    border-radius: 3px;
    opacity: 0.9;
    z-index: 200;
  }
</style>
</head>

<script>
/* ════════════════════════════════
   날씨 API
   YOUR_API_KEY 를 실제 키로 교체하세요
   https://openweathermap.org/api
════════════════════════════════ */
const WEATHER_API_KEY = '8e888afe250816d2d73ee42d6262ae5c';

const W_EMOJI = {
  Clear:'☀️', Clouds:'⛅', Rain:'🌧️',
  Drizzle:'🌦️', Thunderstorm:'⛈️',
  Snow:'❄️', Mist:'🌫️', Fog:'🌫️', Haze:'🌫️'
};

async function fetchWeather(lat, lon) {
  try {
    const r = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`
    );
    const d = await r.json();
    if (d.cod !== 200) throw new Error(d.message);
    document.getElementById('weatherIcon').textContent     = W_EMOJI[d.weather[0].main] || '🌤️';
    document.getElementById('weatherLocation').textContent = d.name || '내 위치';
    document.getElementById('weatherTemp').textContent     = Math.round(d.main.temp) + '°';
    document.getElementById('weatherDesc').textContent     = d.weather[0].description;
  } catch(e) {
    document.getElementById('weatherLocation').textContent = '오류';
    document.getElementById('weatherDesc').textContent     = 'API 키 확인';
  }
}

if (WEATHER_API_KEY !== 'YOUR_API_KEY') {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => fetchWeather(p.coords.latitude, p.coords.longitude),
      () => { document.getElementById('weatherLocation').textContent = '위치 권한 필요'; },
      { timeout: 8000 }
    );
  }
}

/* 슬라이드 */
(function() {
  const track = document.getElementById('heroTrack');
  let index = 0;

  setInterval(() => {
    index++;
    track.style.transform = `translateX(-${375 * index}px)`;

    // 마지막 복제 슬라이드 도달 시 자연스럽게 리셋
    if (index === 3) {
      setTimeout(() => {
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        index = 0;
        // 다시 애니메이션 활성화
        setTimeout(() => {
          track.style.transition = 'transform 0.6s ease';
        }, 50);
      }, 600);
    }
  }, 3000);
})();

/* 시계 */
function tick() {
  const n = new Date();
  document.getElementById('clockTime').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 15000);

/* 드래그 스크롤 */
(function() {
  const el = document.getElementById('hScroll');
  let down = false, sx = 0, sl = 0;
  el.addEventListener('mousedown', e => {
    down = true; el.classList.add('dragging');
    sx = e.pageX - el.offsetLeft; sl = el.scrollLeft;
    e.preventDefault();
  });
  document.addEventListener('mouseup', () => { down = false; el.classList.remove('dragging'); });
  document.addEventListener('mousemove', e => {
    if (!down) return;
    el.scrollLeft = sl - (e.pageX - el.offsetLeft - sx) * 1.2;
  });
  el.addEventListener('touchstart', e => {
    sx = e.touches[0].pageX - el.offsetLeft; sl = el.scrollLeft;
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    el.scrollLeft = sl - (e.touches[0].pageX - el.offsetLeft - sx);
  }, { passive: true });
})();

/* 탭 전환 */
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => {
      i.classList.remove('active');
      i.querySelector('.nav-label').style.color = '';
      i.querySelectorAll('[fill]:not([fill="none"])').forEach(el => el.setAttribute('fill','#bbb'));
      i.querySelectorAll('[stroke]:not([stroke="none"])').forEach(el => el.setAttribute('stroke','#bbb'));
    });
    item.classList.add('active');
    item.querySelector('.nav-label').style.color = '#FF6B2B';
    item.querySelectorAll('[fill]:not([fill="none"])').forEach(el => el.setAttribute('fill','#FF6B2B'));
    item.querySelectorAll('[stroke]:not([stroke="none"])').forEach(el => el.setAttribute('stroke','#FF6B2B'));
  });
});
</script>
